<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Office Trip Counter Ultra Modern</title><style>body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#000000,#220000,#7f1d1d);margin:0;padding:20px;color:#fff}.wrap{max-width:1200px;margin:auto}.head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}.card{background:rgba(255,255,255,.08);border-radius:16px;padding:16px;box-shadow:0 20px 40px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px);margin:10px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.btn{padding:8px 12px;transition:all .25s ease;border:0;border-radius:10px;cursor:pointer}.btn:hover{transform:translateY(-2px);opacity:.92}.btn}.green{background:#16a34a;color:#fff}.red{background:#dc2626;color:#fff}.blue{background:#2563eb;color:#fff}.dark{background:#111;color:#fff}.muted{color:#666;font-size:13px}input{padding:10px;border:1px solid #ccc;border-radius:10px;width:100%}.best{border:2px solid #16a34a}.topbar button{margin:4px}</style></head><body><div class='wrap'><div class='head'><div><h1>Office Trip Counter Ultra Modern</h1><div style='font-size:14px;opacity:.8'>Umar Developer</div></div><div class='topbar'><button class='btn blue' onclick='toggleDark()'>Dark</button><button class='btn blue' onclick='exportCSV()'>CSV</button><button class='btn blue' onclick='admin()'>Admin</button><button class='btn red' onclick='resetAll()'>Reset</button></div></div><div class='card'><input id='search' placeholder='Search employee...' oninput='render()'></div><div class='grid' id='stats'></div><div class='card'><h2>Complaint Box</h2><select id='complainer' style='width:100%;padding:10px;border-radius:12px;margin-bottom:10px'><option>Haris</option><option>Zayan</option><option>Umar</option><option>Kashif</option><option>Buhran</option><option>Ebad</option><option>Muzammil</option><option>Zain</option></select><textarea id='complaint' style='width:100%;height:100px;border-radius:12px;padding:10px'></textarea><br><button class='btn red' onclick='sendComplaint()'>Submit Complaint</button><div id='complaintsView' style='margin-top:10px'></div></div><div class='grid' id='list'></div><div class='card'><h2>Leaderboard</h2><div id='leader'></div></div><div class='card'><h2>Analytics</h2><canvas id='chart' height='120'></canvas></div><div class='card'><h2>History</h2><div id='history'></div></div></div><script src='https://cdn.jsdelivr.net/npm/chart.js'></script><script>
let tripChart;
function playSound(){try{new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3').play()}catch(e){}}
function confetti(){for(let i=0;i<25;i++){let d=document.createElement('div');d.style.position='fixed';d.style.left=Math.random()*100+'%';d.style.top='0';d.style.width='8px';d.style.height='8px';d.style.background=['#f00','#0f0','#00f','#ff0'][i%4];d.style.zIndex='9999';d.style.borderRadius='50%';document.body.appendChild(d);let y=0;let t=setInterval(()=>{y+=6;d.style.top=y+'px';if(y>window.innerHeight){clearInterval(t);d.remove();}},20);}}
function drawChart(){let c=document.getElementById('chart');if(!c)return;let ctx=c.getContext('2d');if(tripChart)tripChart.destroy();tripChart=new Chart(ctx,{type:'bar',data:{labels:staff,datasets:[{label:'Trips',data:staff.map(n=>db.users[n].count)}]},options:{responsive:true,plugins:{legend:{display:false}}}})}
const staff=['Haris','Zayan','Umar','Kashif','Buhran','Ebad','Muzammil','Zain'];let db=JSON.parse(localStorage.getItem('officeTripFinal')||'null')||{users:{},log:[]};if(!Object.keys(db.users).length){staff.forEach(n=>db.users[n]={count:0,last:0});save()}function save(){localStorage.setItem('officeTripFinal',JSON.stringify(db))}function sortUsers(){return [...staff].sort((a,b)=>db.users[a].count-db.users[b].count||db.users[a].last-db.users[b].last)}function add(n){if(!isAdmin){alert('Only Admin Can Add/Remove');return;}db.users[n].count++;playSound();confetti();db.users[n].last=Date.now();db.log.unshift(n+' +1 - '+new Date().toLocaleString());save();render()}function sub(n){if(!isAdmin){alert('Only Admin Can Add/Remove');return;}if(db.users[n].count>0){db.users[n].count--;db.log.unshift(n+' -1 - '+new Date().toLocaleString());save();render()}}function fairness(){let arr=staff.map(n=>db.users[n].count);return Math.max(...arr)-Math.min(...arr)}function todayTrips(){return db.log.filter(x=>x.includes('+1')&&x.includes(new Date().toLocaleDateString())).length}function render(){let q=document.getElementById('search').value.toLowerCase();let order=sortUsers();let rec=order[0];document.getElementById('stats').innerHTML=`<div class='card'><b>Today Trips</b><h2>${todayTrips()}</h2></div><div class='card'><b>Recommended</b><h2>${rec}</h2></div><div class='card'><b>Fairness Gap</b><h2>${fairness()}</h2></div><div class='card'><b>Total Trips</b><h2>${staff.reduce((s,n)=>s+db.users[n].count,0)}</h2></div>`;document.getElementById('list').innerHTML=order.filter(n=>n.toLowerCase().includes(q)).map(n=>`<div class='card ${n===rec?'best':''}'><h3>${n}</h3><p>Trips: <b>${db.users[n].count}</b></p><p class='muted'>Last: ${db.users[n].last?new Date(db.users[n].last).toLocaleString():'Never'}</p><button class='btn green' onclick="add('${n}')">+ Add Trip</button> <button class='btn red' onclick="sub('${n}')">- Remove</button></div>`).join('');document.getElementById('leader').innerHTML=sortUsers().map((n,i)=>`<div style='padding:6px;border-bottom:1px solid #eee'>#${i+1} ${n} - ${db.users[n].count}</div>`).join('');drawChart();document.getElementById('complaintsView').innerHTML=db.log.filter(x=>x.startsWith('Complaint by')).slice(0,5).map(x=>`<div style='padding:6px;border-bottom:1px solid #333'>${x}</div>`).join('');document.getElementById('history').innerHTML=db.log.slice(0,20).map(x=>`<div style='padding:6px;border-bottom:1px solid #eee'>${x}</div>`).join('')}function resetAll(){if(!isAdmin){alert('Admin Only');return;}if(confirm('Reset all data?')){db={users:{},log:[]};staff.forEach(n=>db.users[n]={count:0,last:0});save();render()}}let isAdmin=false;function admin(){let p=prompt('Enter PIN');if(p==='1234'){isAdmin=true;alert('Admin Access Granted');render();}else{alert('Wrong PIN')}}function exportCSV(){if(!isAdmin){alert('Admin Only');return;}let csv='Name,Trips\n';staff.forEach(n=>csv+=n+','+db.users[n].count+'\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='trips.csv';a.click()}let dark=false;function sendComplaint(){let t=document.getElementById('complaint').value.trim();let n=document.getElementById('complainer').value;if(!t)return;db.log.unshift('Complaint by '+n+': '+t+' - '+new Date().toLocaleString());save();document.getElementById('complaint').value='';render();alert('Complaint Submitted')} function toggleDark(){dark=!dark;if(dark){document.body.style.background='#111';document.body.style.color='#fff';document.querySelectorAll('.card').forEach(c=>{c.style.background='#1f1f1f';c.style.color='#fff';});document.querySelectorAll('input').forEach(i=>{i.style.background='#222';i.style.color='#fff';i.style.border='1px solid #555';});}else{document.body.style.background='#eef2f7';document.body.style.color='#111';document.querySelectorAll('.card').forEach(c=>{c.style.background='#fff';c.style.color='#111';});document.querySelectorAll('input').forEach(i=>{i.style.background='#fff';i.style.color='#111';i.style.border='1px solid #ccc';});}}render();</script></body></html>
